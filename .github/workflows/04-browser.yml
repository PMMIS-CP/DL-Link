name: 4-Browse the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to visit (supports complex pages, redirects, anti-bot)'
        required: true
        type: string
      mode:
        description: 'Operation mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - extract_only
          - browser_download
          - browser_then_download

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        uses: ./.github/actions/git-config
        with:
          large_file_config: 'false'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip bc aria2

      - name: Setup environment
        id: setup
        run: |
          BACKUP_DIR="/tmp/browser_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          
          echo "REPO_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          echo "BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "BACKUP_DIR=$BACKUP_DIR" >> "$GITHUB_ENV"
          echo "SPLIT_THRESHOLD_MB=45" >> "$GITHUB_ENV"
          
          echo "backup_dir=$BACKUP_DIR" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          
          mkdir -p downloads

      # ============================================================
      # STEP 1: Browser Navigator - Extract links first
      # ============================================================
      - name: Navigate and extract links via browser
        id: browser_navigate
        uses: ./.github/actions/browser-download
        with:
          url: ${{ github.event.inputs.url }}
          mode: extract

      - name: Show extracted links
        run: |
          echo "=========================================="
          echo "Browser Navigator Results:"
          echo "=========================================="
          echo "Direct URLs found: ${{ steps.browser_navigate.outputs.has_direct_urls }}"
          if [ "${{ steps.browser_navigate.outputs.has_direct_urls }}" = "true" ]; then
            echo ""
            echo "Direct download links:"
            echo "${{ steps.browser_navigate.outputs.direct_urls }}"
          fi
          echo ""
          echo "All candidate URLs:"
          echo "${{ steps.browser_navigate.outputs.all_urls }}"

      # ============================================================
      # STEP 2: Filter URLs - separate direct URLs from complex ones
      # ============================================================
      - name: Filter and categorize URLs
        id: filter_urls
        if: steps.browser_navigate.outputs.has_direct_urls == 'true' || steps.browser_navigate.outputs.all_urls != ''
        run: |
          DIRECT_URLS="${{ steps.browser_navigate.outputs.direct_urls }}"
          ALL_URLS="${{ steps.browser_navigate.outputs.all_urls }}"
          
          SIMPLE_URLS=""
          COMPLEX_URLS=""
          
          # Process each URL
          for url in $ALL_URLS; do
            [ -z "$url" ] && continue
            
            # Check if URL is "complex" (GitHub release, tokens, very long query strings)
            if echo "$url" | grep -qiE '(github\.com.*release.*assets|jwt=|sig=|se=|sp=|spr=|sr=|sv=|skoid=|sktid=|skt=|ske=|sks=|skv=|rsct=|rscd=)' || \
               [ "$(echo "$url" | wc -c)" -gt 400 ]; then
              COMPLEX_URLS="${COMPLEX_URLS}${url}"$'\n'
              echo "COMPLEX: $url"
            else
              SIMPLE_URLS="${SIMPLE_URLS}${url}"$'\n'
              echo "SIMPLE: $url"
            fi
          done
          
          # Store results
          {
            echo "simple_urls<<FILTER_EOF"
            echo "$SIMPLE_URLS"
            echo "FILTER_EOF"
          } >> "$GITHUB_OUTPUT"
          
          {
            echo "complex_urls<<FILTER_EOF"
            echo "$COMPLEX_URLS"
            echo "FILTER_EOF"
          } >> "$GITHUB_OUTPUT"
          
          if [ -n "$SIMPLE_URLS" ]; then
            echo "has_simple_urls=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_simple_urls=false" >> "$GITHUB_OUTPUT"
          fi
          
          if [ -n "$COMPLEX_URLS" ]; then
            echo "has_complex_urls=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_complex_urls=false" >> "$GITHUB_OUTPUT"
          fi

      # ============================================================
      # STEP 3: Download simple URLs with aria2
      # ============================================================
      - name: Download simple URLs with aria2
        id: download_links
        if: steps.filter_urls.outputs.has_simple_urls == 'true'
        uses: ./.github/actions/download-aria2
        with:
          urls: ${{ steps.filter_urls.outputs.simple_urls }}
          dest_dir: tmp_downloads
          backup_dir: ${{ steps.setup.outputs.backup_dir }}

      # ============================================================
      # STEP 4: Browser direct download (for complex URLs or as primary)
      # ============================================================
      - name: Browser direct download
        id: browser_download
        if: |
          github.event.inputs.mode == 'browser_download' ||
          github.event.inputs.mode == 'browser_then_download' ||
          (github.event.inputs.mode == 'auto' && steps.browser_navigate.outputs.has_direct_urls != 'true') ||
          (steps.filter_urls.outputs.has_complex_urls == 'true')
        uses: ./.github/actions/browser-download
        with:
          url: ${{ github.event.inputs.url }}
          mode: download
          download_path: ${{ github.workspace }}/browser_downloads

      - name: Show browser download results
        if: steps.browser_download.outputs.has_browser_files == 'true'
        run: |
          echo "=========================================="
          echo "Browser Download Results:"
          echo "=========================================="
          echo "Files downloaded via browser:"
          echo "${{ steps.browser_download.outputs.browser_downloaded_files }}"
          echo ""
          ls -la browser_downloads/ 2>/dev/null || echo "No files in browser_downloads"

      - name: Copy browser-downloaded files to tmp_downloads
        if: steps.browser_download.outputs.has_browser_files == 'true'
        run: |
          echo "Copying browser-downloaded files to processing directory..."
          mkdir -p tmp_downloads
          cp -r browser_downloads/* tmp_downloads/ 2>/dev/null || true
          echo "Files in tmp_downloads:"
          ls -la tmp_downloads/

      # ============================================================
      # STEP 5: Process downloaded files (zip/split)
      # ============================================================
      - name: Process downloads
        if: |
          (steps.download_links.outputs.has_files == 'true') ||
          (steps.browser_download.outputs.has_browser_files == 'true')
        shell: bash
        run: |
          source ./.github/scripts/utils/random-name.sh
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          BACKUP_DIR="${{ steps.setup.outputs.backup_dir }}"
          REPO_OWNER="${{ env.REPO_OWNER }}"
          REPO_NAME="${{ env.REPO_NAME }}"
          BRANCH="${{ steps.setup.outputs.branch }}"
          SPLIT_THRESHOLD_MB="${{ env.SPLIT_THRESHOLD_MB }}"
          SPLIT_THRESHOLD_BYTES=$((SPLIT_THRESHOLD_MB * 1024 * 1024))
          
          echo "Processing files in tmp_downloads..."
          ls -la tmp_downloads/ 2>/dev/null || echo "tmp_downloads is empty"
          
          for FILE in tmp_downloads/*; do
            [ -f "$FILE" ] || continue
            [ -s "$FILE" ] || continue
            
            SIZE=$(stat -c%s "$FILE")
            [ "$SIZE" -gt 0 ] || continue
            
            BASENAME=$(basename "$FILE")
            BASENAME_NO_EXT="${BASENAME%.*}"
            EXT="${BASENAME##*.}"
            
            echo "Processing: $BASENAME (${SIZE} bytes)"
            
            FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BACKUP_DIR" "$BASENAME_NO_EXT")
            mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
            
            if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
              echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting"
              
              TEMP_NAME="file_$$"
              cp "$FILE" "tmp_downloads/${TEMP_NAME}.${EXT}"
              
              cd tmp_downloads
              zip -0 -s "${SPLIT_THRESHOLD_MB}m" "${TEMP_NAME}.zip" "${TEMP_NAME}.${EXT}"
              
              for part in ${TEMP_NAME}.z[0-9]* ${TEMP_NAME}.zip; do
                [ -f "$part" ] && [ -s "$part" ] || continue
                PART_EXT="${part##*.}"
                mv "$part" "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.${PART_EXT}"
              done
              rm -f "${TEMP_NAME}.${EXT}"
              cd - > /dev/null
              
              PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.z* 2>/dev/null | wc -l)
              TOTAL_SIZE=0
              for pf in "$BACKUP_DIR/${FOLDER_NAME}"/*; do
                [ -f "$pf" ] || continue
                PSIZE=$(stat -c%s "$pf" 2>/dev/null || echo 0)
                TOTAL_SIZE=$((TOTAL_SIZE + PSIZE))
              done
              TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
              
              FOLDER_ENCODED=$(urlencode "$FOLDER_NAME")
              DOWNLOAD_LINKS_MD=""
              LINK_NUM=0
              for part_file in "$BACKUP_DIR/${FOLDER_NAME}/"*.z*; do
                [ -f "$part_file" ] || continue
                PART_BASENAME=$(basename "$part_file")
                PART_ENCODED=$(urlencode "$PART_BASENAME")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                LINK_NUM=$((LINK_NUM + 1))
                DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
              done
              
              {
                printf '%s\n' "# ${BASENAME_NO_EXT}"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Download Information"
                printf '%s\n' ""
                printf '%s\n' "| Property | Value |"
                printf '%s\n' "|----------|-------|"
                printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                printf '%s\n' "| **Total Size** | **${PARTS_COUNT} zip parts** - **${TOTAL_SIZE_MB} MB** |"
                printf '%s\n' "| **Status** | **Complete (100%)** |"
                printf '%s\n' "| **Source** | Browser Navigator |"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Download Links"
                printf '%s\n' ""
                printf '%s\n' "| # | File | Link |"
                printf '%s\n' "|---|------|------|"
                printf '%s' "${DOWNLOAD_LINKS_MD}"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## How to Extract"
                printf '%s\n' ""
                printf '%s\n' "1. **Download** all \`.zip\` and \`.z01\`, \`.z02\`... files"
                printf '%s\n' "2. **Extract** using [7-Zip](https://www.7-zip.org/) or [WinRAR](https://www.rarlab.com/)"
                printf '%s\n' "3. Open the \`.zip\` file - all parts will combine automatically"
              } > "$BACKUP_DIR/${FOLDER_NAME}/README.md"
            else
              zip -j "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" "$FILE"
              
              SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
              FILE_ENCODED=$(urlencode "${FOLDER_NAME}.zip")
              RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"
              
              {
                printf '%s\n' "# ${BASENAME_NO_EXT}"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Download Information"
                printf '%s\n' ""
                printf '%s\n' "| Property | Value |"
                printf '%s\n' "|----------|-------|"
                printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                printf '%s\n' "| **Status** | **Complete (100%)** |"
                printf '%s\n' "| **Source** | Browser Navigator |"
                printf '%s\n' ""
                printf '%s\n' "---"
                printf '%s\n' ""
                printf '%s\n' "## Download Link"
                printf '%s\n' ""
                printf '%s\n' "| File | Link |"
                printf '%s\n' "|------|------|"
                printf '%s\n' "| \`${FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
              } > "$BACKUP_DIR/${FOLDER_NAME}/README.md"
            fi
            
            echo "Created: $BACKUP_DIR/$FOLDER_NAME/"
          done
          
          rm -rf tmp_downloads browser_downloads

      # ============================================================
      # STEP 6: Update README and push
      # ============================================================
      - name: Update README files
        shell: bash
        run: |
          BACKUP_DIR="${{ steps.setup.outputs.backup_dir }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A "$BACKUP_DIR" 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi
          
          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)
          
          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi
          
          {
            echo "# Downloaded list (via Browser) :"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              echo "- [${FOLDER}](./${FOLDER_ENCODED})"
            done
          } > "downloads/README.md"
          
          SECTION_TITLE="Downloaded files in your GitHub :"
          
          if [ ! -f "README.md" ]; then
            echo "# Downloader" > README.md
            echo "" >> README.md
          fi
          
          if grep -q "$SECTION_TITLE" README.md 2>/dev/null; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi
          
          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              echo "${COUNTER}. [${FOLDER}](${REPO_URL}/${FOLDER_ENCODED})"
              echo ""
              COUNTER=$((COUNTER + 1))
            done
            echo "---"
          } >> README.md

      - name: Commit and push
        uses: ./.github/actions/git-push-batch
        with:
          backup_dir: ${{ steps.setup.outputs.backup_dir }}
          branch: ${{ steps.setup.outputs.branch }}
          batch_size: '3'