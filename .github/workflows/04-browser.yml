name: 4-Browse the Web

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'URL to extract download links from (supports anti-bot/JS-rendered pages)'
        required: true
        type: string

jobs:
  browse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        uses: ./.github/actions/git-config
        with:
          user_name: 'github-actions'
          user_email: 'github-actions@github.com'
          large_file_config: 'false'

      - name: Setup environment
        id: setup
        run: |
          BACKUP_DIR="/tmp/download_backup_browser_$$"
          mkdir -p "$BACKUP_DIR"
          echo "backup_dir=$BACKUP_DIR" >> "$GITHUB_OUTPUT"
          echo "BACKUP_DIR: $BACKUP_DIR"

      - name: Extract links via browser
        id: browser
        uses: ./.github/actions/browser-download
        with:
          url: ${{ github.event.inputs.url }}

      - name: Download extracted URLs with aria2
        if: steps.browser.outputs.has_extracted_urls == 'true'
        uses: ./.github/actions/download-aria2
        with:
          urls: ${{ steps.browser.outputs.extracted_urls }}
          dest_dir: tmp_downloads
          backup_dir: ${{ steps.setup.outputs.backup_dir }}

      - name: Copy browser-downloaded files
        if: steps.browser.outputs.has_files == 'true'
        run: |
          mkdir -p downloads/browser
          cp -r browser_downloads/* downloads/browser/ 2>/dev/null || true
          echo "Browser files copied to downloads/browser/"

      - name: Commit and push
        if: |
          steps.browser.outputs.has_files == 'true' ||
          steps.browser.outputs.has_extracted_urls == 'true'
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          git add downloads/ README.md 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          
          git commit -m "[Browser] Add files from URL extraction [skip ci]"
          
          # Pull with rebase, fallback to merge
          git pull --rebase origin "$BRANCH" 2>/dev/null || {
            echo "Rebase failed, trying merge..."
            git fetch origin "$BRANCH"
            git merge origin/"$BRANCH" --no-edit 2>/dev/null || true
          }
          
          # Push with retry
          PUSH_RETRY=0
          MAX_RETRIES=5
          while [ $PUSH_RETRY -lt $MAX_RETRIES ]; do
            PUSH_RETRY=$((PUSH_RETRY + 1))
            if timeout 120 git push origin HEAD:"$BRANCH" 2>&1; then
              echo "✓ Pushed successfully!"
              exit 0
            fi
            echo "Push failed, retry $PUSH_RETRY/$MAX_RETRIES..."
            sleep $((2 + RANDOM % 5))
            git fetch origin "$BRANCH" --quiet
            git reset --hard origin/"$BRANCH" 2>/dev/null || true
          done
          
          echo "⚠ Push failed after $MAX_RETRIES attempts"