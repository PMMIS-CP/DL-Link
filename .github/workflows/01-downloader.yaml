name: 01- Download from url

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Space-separated list of URLs to download'
        required: true
        type: string
      mode:
        description: 'Download mode'
        required: false
        default: 'normal'
        type: choice
        options:
          - normal
          - zip
      password:
        description: 'Password for zip files (optional)'
        required: false
        default: ''
        type: string

jobs:
  save-file:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure Git
        uses: ./.github/actions/git-config
        with:
          large_file_config: 'true'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y zip curl bc

      - name: Setup environment
        id: setup
        run: |
          BACKUP_DIR="/tmp/download_backup_$$"
          mkdir -p "$BACKUP_DIR"
          echo "$BACKUP_DIR" > /tmp/backup_dir_path.txt
          
          echo "REPO_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"
          echo "REPO_NAME=${{ github.event.repository.name }}" >> "$GITHUB_ENV"
          echo "SPLIT_THRESHOLD_MB=45" >> "$GITHUB_ENV"
          
          # Use outputs instead of env for values needed in 'uses' context
          echo "backup_dir=$BACKUP_DIR" >> "$GITHUB_OUTPUT"
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          
          mkdir -p downloads

      - name: Download files
        id: download
        uses: ./.github/actions/download-aria2
        with:
          urls: ${{ github.event.inputs.urls }}
          dest_dir: tmp_downloads
          backup_dir: ${{ steps.setup.outputs.backup_dir }}
          split_threshold_mb: '45'

      - name: Create error READMEs for failed downloads
        if: failure() || steps.download.outcome == 'failure'
        run: |
          if [ -f /tmp/error_files.txt ]; then
            while IFS=: read -r FOLDER_NAME FILENAME URL; do
              echo "Creating error README for: $FILENAME"
              ./.github/actions/readme-generator/action.yml
            done < /tmp/error_files.txt
          fi

      - name: Process downloads (zip/split)
        if: steps.download.outputs.has_files == 'true'
        shell: bash
        env:
          MODE: ${{ github.event.inputs.mode }}
          ZIP_PASSWORD: ${{ github.event.inputs.password }}
        run: |
          source ./.github/scripts/utils/random-name.sh
          
          MODE="${{ github.event.inputs.mode }}"
          ZIP_PASSWORD="${{ github.event.inputs.password }}"
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          if [ "$MODE" = "zip" ]; then
            # Archive mode - zip all files together
            if [ -n "$(ls -A tmp_downloads 2>/dev/null)" ]; then
              VALID_FILES=$(find tmp_downloads -type f -size +0c 2>/dev/null | tr '\n' ' ')
              
              if [ -n "$VALID_FILES" ]; then
                ARCHIVE_NAME="archive_$(date +%Y%m%d_%H%M%S)"
                FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BACKUP_DIR" "$ARCHIVE_NAME")
                mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
                
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" $VALID_FILES
                else
                  zip -j "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" $VALID_FILES
                fi
                
                if [ -s "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip" ]; then
                  ZIP_SIZE=$(stat -c%s "$BACKUP_DIR/$FOLDER_NAME/${ARCHIVE_NAME}.zip")
                  ZIP_SIZE_MB=$(echo "scale=2; $ZIP_SIZE / 1024 / 1024" | bc)
                  
                  # Generate README using readme-generator action params concept
                  FOLDER_ENCODED=$(urlencode "${FOLDER_NAME}")
                  FILE_ENCODED=$(urlencode "${ARCHIVE_NAME}.zip")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"
                  
                  {
                    echo "# ${ARCHIVE_NAME} Archive"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Information"
                    echo ""
                    echo "| Property | Value |"
                    echo "|----------|-------|"
                    echo "| **Archive Name** | \`${ARCHIVE_NAME}.zip\` |"
                    echo "| **Size** | ${ZIP_SIZE_MB} MB |"
                    echo "| **Status** | **Complete (100%)** |"
                    [ -n "$ZIP_PASSWORD" ] && echo "| **Password Protected** | **YES** |" || echo "| **Password Protected** | **NO** |"
                    echo ""
                    echo "---"
                    echo ""
                    echo "## Download Link"
                    echo ""
                    echo "| File | Link |"
                    echo "|------|------|"
                    echo "| \`${ARCHIVE_NAME}.zip\` | [Download](${RAW_LINK}) |"
                  } > "$BACKUP_DIR/$FOLDER_NAME/README.md"
                fi
              fi
            fi
          else
            # Normal mode - process each file individually
            SPLIT_THRESHOLD_BYTES=$((SPLIT_THRESHOLD_MB * 1024 * 1024))
            
            for FILE in tmp_downloads/*; do
              [ -f "$FILE" ] || continue
              [ -s "$FILE" ] || continue
              
              SIZE=$(stat -c%s "$FILE")
              [ "$SIZE" -gt 0 ] || continue
              
              BASENAME=$(basename "$FILE")
              BASENAME_NO_EXT="${BASENAME%.*}"
              EXT="${BASENAME##*.}"
              
              FOLDER_NAME=$(get_unique_folder "$BACKUP_DIR" "$BACKUP_DIR" "$BASENAME_NO_EXT")
              mkdir -p "$BACKUP_DIR/$FOLDER_NAME"
              
              if [ "$SIZE" -gt "$SPLIT_THRESHOLD_BYTES" ]; then
                # Split large files
                echo "$BASENAME is $(( SIZE / 1024 / 1024 ))MB - splitting"
                TEMP_NAME="file_$$"
                cp "$FILE" "tmp_downloads/${TEMP_NAME}.${EXT}"
                
                cd tmp_downloads
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" -P "$ZIP_PASSWORD" "${TEMP_NAME}.zip" "${TEMP_NAME}.${EXT}"
                else
                  zip -0 -s "${SPLIT_THRESHOLD_MB}m" "${TEMP_NAME}.zip" "${TEMP_NAME}.${EXT}"
                fi
                
                for part in ${TEMP_NAME}.z[0-9]* ${TEMP_NAME}.zip; do
                  [ -f "$part" ] && [ -s "$part" ] || continue
                  PART_EXT="${part##*.}"
                  mv "$part" "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.${PART_EXT}"
                done
                rm -f "${TEMP_NAME}.${EXT}"
                cd - > /dev/null
                
                # Generate split README
                PARTS_COUNT=$(ls "$BACKUP_DIR/${FOLDER_NAME}/"*.z* 2>/dev/null | wc -l)
                TOTAL_SIZE=0
                for pf in "$BACKUP_DIR/${FOLDER_NAME}"/*; do
                  [ -f "$pf" ] || continue
                  PSIZE=$(stat -c%s "$pf" 2>/dev/null || echo 0)
                  TOTAL_SIZE=$((TOTAL_SIZE + PSIZE))
                done
                TOTAL_SIZE_MB=$(echo "scale=2; $TOTAL_SIZE / 1024 / 1024" | bc)
                
                DOWNLOAD_LINKS_MD=""
                LINK_NUM=0
                for part_file in "$BACKUP_DIR/${FOLDER_NAME}/"*.z*; do
                  [ -f "$part_file" ] || continue
                  PART_BASENAME=$(basename "$part_file")
                  PART_ENCODED=$(urlencode "${PART_BASENAME}")
                  RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${PART_ENCODED}"
                  LINK_NUM=$((LINK_NUM + 1))
                  DOWNLOAD_LINKS_MD="${DOWNLOAD_LINKS_MD}| ${LINK_NUM} | \`${PART_BASENAME}\` | [Download](${RAW_LINK}) |"$'\n'
                done
                
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Total Size** | **${PARTS_COUNT} zip parts** - **${TOTAL_SIZE_MB} MB** |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  [ -n "$ZIP_PASSWORD" ] && printf '%s\n' "| **Password Protected** | **YES** |" || printf '%s\n' "| **Password Protected** | **NO** |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Links"
                  printf '%s\n' ""
                  printf '%s\n' "| # | File | Link |"
                  printf '%s\n' "|---|------|------|"
                  printf '%s' "${DOWNLOAD_LINKS_MD}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## How to Extract"
                  printf '%s\n' ""
                  printf '%s\n' "1. **Download** all \`.zip\` and \`.z01\`, \`.z02\`... files"
                  printf '%s\n' "2. **Extract** using [7-Zip](https://www.7-zip.org/) or [WinRAR](https://www.rarlab.com/)"
                  printf '%s\n' "3. Open the \`.zip\` file - all parts will combine automatically"
                } > "$BACKUP_DIR/${FOLDER_NAME}/README.md"
              else
                # Single file zip
                if [ -n "$ZIP_PASSWORD" ]; then
                  zip -j -P "$ZIP_PASSWORD" "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" "$FILE"
                else
                  zip -j "$BACKUP_DIR/${FOLDER_NAME}/${FOLDER_NAME}.zip" "$FILE"
                fi
                
                SIZE_MB=$(echo "scale=2; $SIZE / 1024 / 1024" | bc)
                FILE_ENCODED=$(urlencode "${FOLDER_NAME}.zip")
                RAW_LINK="https://github.com/${REPO_OWNER}/${REPO_NAME}/raw/${BRANCH}/downloads/${FOLDER_ENCODED}/${FILE_ENCODED}"
                
                {
                  printf '%s\n' "# ${BASENAME_NO_EXT}"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Information"
                  printf '%s\n' ""
                  printf '%s\n' "| Property | Value |"
                  printf '%s\n' "|----------|-------|"
                  printf '%s\n' "| **Original File** | \`${BASENAME}\` |"
                  printf '%s\n' "| **Size** | ${SIZE_MB} MB |"
                  printf '%s\n' "| **Status** | **Complete (100%)** |"
                  [ -n "$ZIP_PASSWORD" ] && printf '%s\n' "| **Password Protected** | **YES** |" || printf '%s\n' "| **Password Protected** | **NO** |"
                  printf '%s\n' ""
                  printf '%s\n' "---"
                  printf '%s\n' ""
                  printf '%s\n' "## Download Link"
                  printf '%s\n' ""
                  printf '%s\n' "| File | Link |"
                  printf '%s\n' "|------|------|"
                  printf '%s\n' "| \`${FOLDER_NAME}.zip\` | [Download](${RAW_LINK}) |"
                } > "$BACKUP_DIR/${FOLDER_NAME}/README.md"
              fi
            done
          fi
          
          rm -rf tmp_downloads

      - name: Update README files
        shell: bash
        run: |
          BACKUP_DIR=$(cat /tmp/backup_dir_path.txt)
          REPO_URL="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}/downloads"
          
          urlencode() {
            python3 -c "import urllib.parse, sys; print(urllib.parse.quote(sys.argv[1], safe=''))" "$1"
          }
          
          # Copy backup files to downloads folder
          mkdir -p downloads
          if [ -d "$BACKUP_DIR" ] && [ "$(ls -A "$BACKUP_DIR" 2>/dev/null)" ]; then
            cp -r "$BACKUP_DIR"/* downloads/
          fi
          
          FOLDERS=$(find downloads -mindepth 1 -maxdepth 1 -type d -printf '%f\n' 2>/dev/null | sort)
          
          if [ -z "$FOLDERS" ]; then
            echo "No folders found in downloads"
            exit 0
          fi
          
          # Create downloads/README.md
          {
            echo "# Downloaded list :"
            echo ""
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              echo "- [${FOLDER}](./${FOLDER_ENCODED})"
            done
          } > "downloads/README.md"
          
          # Update root README.md
          SECTION_TITLE="Downloaded files in your GitHub :"
          
          if [ ! -f "README.md" ]; then
            echo "# Downloader" > README.md
            echo "" >> README.md
          fi
          
          if grep -q "$SECTION_TITLE" README.md 2>/dev/null; then
            sed -i "/$SECTION_TITLE/,/^---$/d" README.md
            sed -i '${/^$/d;}' README.md
          fi
          
          {
            echo ""
            echo "---"
            echo ""
            echo "## $SECTION_TITLE"
            echo ""
            COUNTER=1
            echo "$FOLDERS" | while read -r FOLDER; do
              [ -n "$FOLDER" ] || continue
              FOLDER_ENCODED=$(urlencode "${FOLDER}")
              echo "${COUNTER}. [${FOLDER}](${REPO_URL}/${FOLDER_ENCODED})"
              echo ""
              COUNTER=$((COUNTER + 1))
            done
            echo "---"
          } >> README.md
          
          echo "README files updated"

      - name: Incremental Commit & Push
        uses: ./.github/actions/git-push-batch
        with:
          backup_dir: ${{ steps.setup.outputs.backup_dir }}
          branch: ${{ steps.setup.outputs.branch }}
          batch_size: '3'